<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節奏小偵探：二拍子與三拍子</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #eef7ff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2.5rem; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        h1 { color: #2c3e50; font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #7f8c8d; margin-bottom: 1.5rem; }
        .score { font-size: 1.8rem; color: #f39c12; font-weight: bold; margin-bottom: 1.5rem; background: #fff9e6; padding: 10px; border-radius: 15px; }
        
        #play-btn { background-color: #2ecc71; color: white; border: none; padding: 18px 50px; font-size: 1.4rem; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-bottom: 2rem; box-shadow: 0 5px 0 #27ae60; }
        #play-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #27ae60; }
        #play-btn:disabled { background-color: #bdc3c7; box-shadow: none; cursor: not-allowed; }

        .choices { display: flex; gap: 20px; justify-content: center; }
        .choice-btn { background-color: #3498db; color: white; border: none; padding: 25px 0; width: 140px; font-size: 1.3rem; border-radius: 20px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 #2980b9; }
        .choice-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2980b9; }
        .choice-btn span { font-size: 0.9rem; display: block; margin-top: 5px; opacity: 0.9; }

        #feedback { margin-top: 25px; font-size: 1.3rem; font-weight: bold; min-height: 1.5em; border-radius: 10px; padding: 5px; }
        .correct { color: #2ecc71; background: #eafff0; }
        .wrong { color: #e74c3c; background: #ffeaea; }
        
        /* 動畫效果 */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-win { animation: bounce 0.5s ease infinite; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🎵 節奏小偵探 🎵</h1>
    <p>聽一聽強弱規律，選出正確拍子</p>
    
    <div class="score">得分：<span id="score-val">0</span></div>
    
    <button id="play-btn">▶️ 按我開始聽</button>

    <div class="choices">
        <button class="choice-btn" onclick="checkAnswer(2)">
            2 拍子
            <span>(強 - 弱)</span>
        </button>
        <button class="choice-btn" style="background-color: #9b59b6; box-shadow: 0 5px 0 #8e44ad;" onclick="checkAnswer(3)">
            3 拍子
            <span>(強-弱-弱)</span>
        </button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    // 你的 10 段音檔清單
    const playlist = [
        { src: '2beat_1.mp3', type: 2 },
        { src: '2beat_2.mp3', type: 2 },
        { src: '2beat_3.mp3', type: 2 },
        { src: '2beat_4.mp3', type: 2 },
        { src: '2beat_5.mp3', type: 2 },
        { src: '3beat_1.mp3', type: 3 },
        { src: '3beat_2.mp3', type: 3 },
        { src: '3beat_3.mp3', type: 3 },
        { src: '3beat_4.mp3', type: 3 },
        { src: '3beat_5.mp3', type: 3 }
    ];

    let currentTrack = null;
    let score = 0;
    const audio = new Audio();
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score-val');
    const playBtn = document.getElementById('play-btn');

    playBtn.addEventListener('click', () => {
        // 從 10 個音檔中隨機挑選一個
        const randomIndex = Math.floor(Math.random() * playlist.length);
        currentTrack = playlist[randomIndex];
        
        audio.src = currentTrack.src;
        audio.play();

        // 播放時暫時禁用按鈕，防止重複點擊
        playBtn.disabled = true;
        playBtn.innerText = "正在播放...";
        feedbackEl.innerText = "聆聽中，注意強弱感...";
        feedbackEl.className = "";

        audio.onended = () => {
            playBtn.disabled = false;
            playBtn.innerText = "再聽一次 ▶️";
            feedbackEl.innerText = "準備好了嗎？請作答！";
        };
    });

    function checkAnswer(userChoice) {
        if (!currentTrack) {
            feedbackEl.innerText = "請先按上面的綠色播放鈕喔！";
            return;
        }

        if (userChoice === currentTrack.type) {
            feedbackEl.innerText = "🎉 太棒了！答對了！";
            feedbackEl.className = "correct";
            score += 10;
            // 答對後清空 currentTrack，強迫重新點擊播放
            currentTrack = null; 
            playBtn.innerText = "下一題 ▶️";
        } else {
            feedbackEl.innerText = "🧐 差一點點，再仔細聽聽看？";
            feedbackEl.className = "wrong";
        }
        scoreEl.innerText = score;
    }
</script>

</body>
</html>
