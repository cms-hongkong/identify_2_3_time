<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節奏小偵探：自動下一題版</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f7f9fc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        h1 { color: #2c3e50; font-size: 1.8rem; margin: 0 0 10px 0; }
        .score { font-size: 1.5rem; color: #f39c12; font-weight: bold; margin-bottom: 20px; }
        
        /* 播放狀態指示燈 */
        #status-light { width: 20px; height: 20px; border-radius: 50%; background-color: #bdc3c7; display: inline-block; margin-right: 10px; vertical-align: middle; }
        .playing-light { background-color: #2ecc71 !important; box-shadow: 0 0 10px #2ecc71; }

        #play-btn { background-color: #2ecc71; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin-bottom: 1.5rem; transition: 0.3s; }
        #play-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .choices { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        .choice-btn { background-color: #3498db; color: white; border: none; padding: 20px 0; width: 130px; font-size: 1.2rem; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .choice-btn:active { transform: translateY(3px); }
        .choice-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        #feedback { margin-top: 25px; font-size: 1.4rem; font-weight: bold; min-height: 2em; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .correct { color: #27ae60; background-color: #eafaf1; }
        .wrong { color: #e74c3c; background-color: #fdedec; }
        
        .hint { font-size: 0.9rem; color: #95a5a6; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🎵 節奏小偵探</h1>
    <div class="score">得分：<span id="score-val">0</span></div>
    
    <div>
        <div id="status-light"></div>
        <button id="play-btn">開始第一題</button>
    </div>

    <div class="choices">
        <button class="choice-btn" id="btn-2" onclick="checkAnswer(2)" disabled>2 拍子</button>
        <button class="choice-btn" id="btn-3" style="background-color: #9b59b6;" onclick="checkAnswer(3)" disabled>3 拍子</button>
    </div>

    <div id="feedback">點擊按鈕開始遊戲</div>
    <p class="hint">選完答案後，2 秒會自動跳下一題喔！</p>
</div>

<script>
    const playlist = [
        { src: '2beat_1.mp3', type: 2 }, { src: '2beat_2.mp3', type: 2 }, { src: '2beat_3.mp3', type: 2 }, { src: '2beat_4.mp3', type: 2 }, { src: '2beat_5.mp3', type: 2 },
        { src: '3beat_1.mp3', type: 3 }, { src: '3beat_2.mp3', type: 3 }, { src: '3beat_3.mp3', type: 3 }, { src: '3beat_4.mp3', type: 3 }, { src: '3beat_5.mp3', type: 3 }
    ];

    let currentTrack = null;
    let score = 0;
    let canAnswer = false;
    const audio = new Audio();
    
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score-val');
    const playBtn = document.getElementById('play-btn');
    const light = document.getElementById('status-light');
    const btn2 = document.getElementById('btn-2');
    const btn3 = document.getElementById('btn-3');

    // 啟動下一題的函式
    function startNextTask() {
        const randomIndex = Math.floor(Math.random() * playlist.length);
        currentTrack = playlist[randomIndex];
        
        audio.src = currentTrack.src;
        audio.play();

        // UI 狀態更新
        playBtn.disabled = true;
        playBtn.innerText = "正在播放...";
        light.classList.add('playing-light');
        feedbackEl.innerText = "👂 仔細聽...";
        feedbackEl.className = "";
        
        // 允許作答
        canAnswer = true;
        btn2.disabled = false;
        btn3.disabled = false;
    }

    playBtn.addEventListener('click', startNextTask);

    function checkAnswer(userChoice) {
        if (!canAnswer) return;

        // 1. 立即停止聲音
        audio.pause();
        audio.currentTime = 0;
        light.classList.remove('playing-light');
        
        // 2. 鎖定按鈕防止連續點擊
        canAnswer = false;
        btn2.disabled = true;
        btn3.disabled = true;

        // 3. 檢查答案
        if (userChoice === currentTrack.type) {
            feedbackEl.innerText = "🎉 答對了！好厲害！";
            feedbackEl.className = "correct";
            score += 10;
        } else {
            feedbackEl.innerText = "❌ 答錯了，下次加油！";
            feedbackEl.className = "wrong";
        }
        scoreEl.innerText = score;

        // 4. 等待 2 秒後自動下一題
        setTimeout(() => {
            startNextTask();
        }, 2000);
    }
</script>

</body>
</html>
